<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube → Spotify 변환기</title>
  <style>
    :root {
      --bg: #121212; --surface: #181818; --surface-2: #242424; --surface-hover: #2a2a2a;
      --green: #1ed760; --green-press: #1db954;
      --text: #ffffff; --muted: #b3b3b3; --amber: #f0b232; --red: #e05c5c; --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #000; }
    body {
      width: 380px; margin: 0 auto; background: var(--bg); color: var(--text);
      font-family: 'Circular Std', 'Circular', 'Helvetica Neue', Helvetica, Arial,
        'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .app { padding: 16px 16px 20px; }
    .hidden { display: none !important; }

    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
    .badge {
      width: 34px; height: 34px; border-radius: 50%; background: var(--green);
      display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 800; font-size: 16px; flex-shrink: 0;
    }
    .header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
    .header p { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--muted); margin: 14px 2px 8px;
    }
    .label:first-of-type { margin-top: 0; }

    .card { background: var(--surface); border-radius: var(--radius); padding: 12px; }
    .video { display: flex; gap: 12px; }
    .thumb {
      width: 96px; height: 54px; border-radius: 6px; flex-shrink: 0; overflow: hidden;
      background: var(--surface-2); display: flex; align-items: center; justify-content: center;
    }
    .thumb svg { width: 26px; height: 26px; opacity: 0.5; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-meta { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .video-title {
      font-size: 13px; font-weight: 600; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-channel { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .connect {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border-radius: var(--radius); padding: 12px 14px; margin-top: 14px;
    }
    .connect-left { display: flex; flex-direction: column; }
    .connect-left span:first-child { font-size: 13px; font-weight: 600; }
    .connect-status { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .connect-status.on { color: var(--green); }

    .btn {
      font-family: inherit; border: none; cursor: pointer; font-weight: 700; border-radius: 500px;
      transition: transform 0.1s ease, background 0.2s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: default; }
    .btn-sm { padding: 8px 18px; font-size: 12px; }
    .btn-xs { padding: 5px 12px; font-size: 11px; }
    .btn-green { background: var(--green); color: #000; }
    .btn-green:hover { background: #1fdf64; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid #535353; }
    .btn-outline:hover { border-color: var(--text); }
    .btn-ghost { background: var(--surface-2); color: var(--muted); }
    .btn-ghost:hover { color: var(--text); }

    .tracklist {
      background: var(--surface); border-radius: var(--radius);
      max-height: 176px; overflow-y: auto;
    }
    .track { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .track:last-child { border-bottom: none; }
    .track-idx { font-size: 11px; color: var(--muted); width: 16px; text-align: right; flex-shrink: 0; }
    .track-info { min-width: 0; flex: 1; }
    .track-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-empty { padding: 22px 14px; text-align: center; font-size: 12px; color: var(--muted); line-height: 1.5; white-space: pre-line; }

    .cta { width: 100%; padding: 14px; font-size: 14px; margin-top: 14px; }

    /* 진행률 */
    .progress-wrap { margin-top: 14px; }
    .progress-text { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-align: center; }
    .progress-bar { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: var(--green); border-radius: 3px; transition: width 0.3s ease; }

    /* 결과 요약 */
    .summary { display: flex; gap: 8px; margin-top: 4px; }
    .stat { flex: 1; background: var(--surface); border-radius: var(--radius); padding: 10px 8px; text-align: center; }
    .stat b { display: block; font-size: 17px; }
    .stat span { font-size: 10.5px; color: var(--muted); }
    .stat.g b { color: var(--green); } .stat.a b { color: var(--amber); } .stat.r b { color: var(--red); }
    .open-link { display: block; text-align: center; margin-top: 12px; color: var(--green); font-size: 12.5px; font-weight: 700; text-decoration: none; }
    .open-link:hover { text-decoration: underline; }

    /* 검토/수동 항목 */
    .review-item { background: var(--surface); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; }
    .ri-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ri-label { font-size: 12.5px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ri-time { font-size: 10.5px; color: var(--muted); flex-shrink: 0; }
    .cand { display: flex; align-items: center; gap: 8px; padding: 7px 4px; border-radius: 6px; cursor: pointer; }
    .cand:hover { background: var(--surface-hover); }
    .cand-info { min-width: 0; flex: 1; }
    .cand-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cand-sub { font-size: 10.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cand-dur { font-size: 10.5px; color: var(--muted); flex-shrink: 0; }
    .ri-actions { display: flex; gap: 6px; margin-top: 8px; }
    .search-row { display: flex; gap: 6px; margin-top: 8px; }
    .search-row input {
      flex: 1; background: var(--surface-2); border: 1px solid #3a3a3a; border-radius: 500px;
      color: var(--text); font-family: inherit; font-size: 12px; padding: 7px 12px; outline: none;
    }
    .search-row input:focus { border-color: var(--muted); }

    .footer { display: flex; justify-content: center; gap: 6px; margin-top: 14px; font-size: 11px; color: var(--muted); min-height: 14px; }
    .footer b { color: var(--text); font-weight: 600; }

    .tracklist::-webkit-scrollbar, .review-list::-webkit-scrollbar { width: 8px; }
    .tracklist::-webkit-scrollbar-thumb { background: #4d4d4d; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="badge">&#8594;</div>
      <div>
        <h1>YouTube &rarr; Spotify</h1>
        <p>노래 모음 영상 → 재생목록</p>
      </div>
    </div>

    <!-- ===== 기본 화면 ===== -->
    <div id="view-main">
      <div class="label">감지된 영상</div>
      <div class="card">
        <div class="video">
          <div class="thumb" id="thumb">
            <svg id="thumb-ph" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7L8 5z" fill="#b3b3b3"/></svg>
            <img id="thumb-img" alt="" hidden />
          </div>
          <div class="video-meta">
            <div class="video-title" id="video-title">영상을 확인하는 중…</div>
            <div class="video-channel" id="video-channel"></div>
          </div>
        </div>
      </div>

      <div class="connect">
        <div class="connect-left">
          <span>Spotify 계정</span>
          <span class="connect-status" id="spotify-status">연결 안 됨</span>
        </div>
        <button class="btn btn-green btn-sm" id="connect-btn">연결</button>
      </div>

      <div class="label">트랙리스트</div>
      <div class="tracklist" id="track-list">
        <div class="tl-empty">트랙리스트를 읽는 중…</div>
      </div>

      <button class="btn btn-green cta" id="convert-btn">재생목록으로 변환</button>
      <div class="footer" id="stats"></div>
    </div>

    <!-- ===== 변환 중 ===== -->
    <div id="view-progress" class="hidden">
      <div class="card"><div class="video-title" id="prog-title"></div></div>
      <div class="progress-wrap">
        <div class="progress-text" id="prog-text">매칭 중…</div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
      </div>
      <div class="footer">팝업을 닫아도 변환은 계속 진행돼요</div>
    </div>

    <!-- ===== 결과 ===== -->
    <div id="view-result" class="hidden">
      <div class="card"><div class="video-title" id="res-title"></div></div>
      <div class="label">결과</div>
      <div class="summary">
        <div class="stat g"><b id="sum-added">0</b><span>자동 추가</span></div>
        <div class="stat a"><b id="sum-review">0</b><span>확인 필요</span></div>
        <div class="stat r"><b id="sum-notfound">0</b><span>못 찾음</span></div>
      </div>
      <a class="open-link" id="playlist-link" target="_blank" rel="noopener">Spotify에서 재생목록 열기 ↗</a>

      <div id="review-section">
        <div class="label">확인 필요 — 맞는 곡을 선택하세요</div>
        <div id="review-list"></div>
      </div>

      <div id="notfound-section">
        <div class="label">못 찾음 — 직접 검색해서 추가</div>
        <div id="notfound-list"></div>
      </div>

      <button class="btn btn-ghost cta" id="done-btn">새 변환 시작</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
